name: Daily Blog Posts

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 전날 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 글 수'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv

      - name: Generate and publish posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_REPO_PATH: ${{ github.workspace }}
          BLOG_SITE_URL: https://coupang-blog-rho.vercel.app
        run: |
          cd scripts
          python daily_publish.py --count ${{ github.event.inputs.count || '10' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/*.mdx scripts/publish_history.json
          git diff --staged --quiet || git commit -m "feat: 일일 자동 발행 $(date +%Y-%m-%d)"
          git push

      - name: Submit URLs to search engines (IndexNow)
        run: |
          cd scripts
          python submit_urls.py --new-only
