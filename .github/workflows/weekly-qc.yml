name: Weekly QC Check

on:
  schedule:
    # 매주 일요일 00:00 KST (토요일 UTC 15:00)
    - cron: '0 15 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'QC 검사 범위 (일)'
        required: false
        default: '7'

jobs:
  qc:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Run weekly QC
        run: |
          cd scripts
          python daily_publish.py --qc --qc-days ${{ github.event.inputs.days || '7' }}
